<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Download do Pacote - Sucatas Bot</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg-top: #11212d;
        --bg-bottom: #06141b;
        --card: rgba(17, 33, 45, 0.72);
        --line: rgba(155, 191, 212, 0.35);
        --text: #f4fbff;
        --muted: #bdd0dc;
        --accent: #2ec4b6;
        --accent-2: #ff9f1c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(
            1200px 600px at 15% 15%,
            rgba(46, 196, 182, 0.22),
            transparent 60%
          ),
          radial-gradient(
            900px 500px at 80% 85%,
            rgba(255, 159, 28, 0.2),
            transparent 60%
          ),
          linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
        color: var(--text);
        font-family: "Sora", sans-serif;
        padding: 24px;
      }

      .card {
        width: min(760px, 100%);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 30px;
        background: var(--card);
        backdrop-filter: blur(8px);
        box-shadow:
          0 18px 38px rgba(0, 0, 0, 0.35),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }

      .tag {
        display: inline-block;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #0a2026;
        background: linear-gradient(90deg, var(--accent), #7ce9dd);
        border-radius: 999px;
        padding: 6px 10px;
        font-weight: 700;
      }

      h1 {
        margin: 14px 0 10px;
        font-family: "Space Grotesk", sans-serif;
        font-size: clamp(28px, 5vw, 40px);
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.65;
      }

      .description {
        margin-top: 14px;
      }

      .details {
        margin-top: 22px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(7, 18, 25, 0.55);
      }

      .actions {
        margin-top: 24px;
      }

      .download-btn {
        border-radius: 12px;
        padding: 12px 18px;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
        color: #07222f;
        background: linear-gradient(135deg, var(--accent), #6ce5d8);
      }
    </style>
  </head>

  <body>
    <main class="card">
      <span class="tag">Front Page</span>
      <h1>Baixe o arquivo do projeto</h1>

      <p class="description">
        Clique no botão abaixo para baixar automaticamente a versão mais
        recente.
      </p>

      <div class="actions">
        <a id="download-link" class="download-btn" href="#" download>
          Procurando arquivo...
        </a>
      </div>
    </main>

    <script>
      function normalize(str) {
        return str
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[\s_-]/g, "")
          .toLowerCase();
      }

      const files = [
        "Sucatas Bot 1.0.0.exe",
        "Sucatas Bot 1.2.0.exe",
        "Sucatas Bot 2.0.0.exe",
      ];

      function extractVersion(name) {
        const match = name.match(/(\d+\.\d+\.\d+)/);
        return match ? match[1].split(".").map(Number) : null;
      }

      function compareVersions(a, b) {
        for (let i = 0; i < 3; i++) {
          if ((a[i] || 0) > (b[i] || 0)) return -1;
          if ((a[i] || 0) < (b[i] || 0)) return 1;
        }
        return 0;
      }

      (function () {
        const downloadLink = document.getElementById("download-link");
        const targetPrefix = normalize("sucatasbot");

        const candidates = files
          .filter((f) => normalize(f).startsWith(targetPrefix))
          .map((f) => ({
            name: f,
            version: extractVersion(f),
          }))
          .filter((f) => f.version)
          .sort((a, b) => compareVersions(a.version, b.version));

        const latest = candidates[0];

        if (!latest) {
          downloadLink.textContent = "Arquivo não encontrado";
          return;
        }

        downloadLink.href = "./" + latest.name;
        downloadLink.download = latest.name;
        downloadLink.textContent = "Baixar " + latest.name;
      })();
    </script>
  </body>
</html>
